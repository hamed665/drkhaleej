name: P07 State Finalizer

on:
  push:
    branches:
      - agent/rollback-exact-recovery-p07
    paths:
      - 'scripts/import/finalize-p07-state.mjs'
      - '.github/workflows/p07-state-finalizer.yml'
      - 'docs/import/import-readiness-roadmap-after-933.md'
      - 'docs/project-state/CURRENT_STATE.md'
      - 'docs/project-state/V10_4_PHASE_ALIGNMENT_MATRIX.md'
      - 'README.md'
      - 'AGENTS.md'
      - 'scripts/import/check-import-readiness-state-alignment.mjs'
      - 'scripts/import/test-import-readiness-state-alignment.mjs'

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rollback-exact-recovery-p07
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact P07 alignment
        run: node scripts/import/finalize-p07-state.mjs
      - name: Commit generated alignment
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'P07 alignment already finalized.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add AGENTS.md README.md docs/import/import-readiness-roadmap-after-933.md docs/project-state/CURRENT_STATE.md docs/project-state/V10_4_PHASE_ALIGNMENT_MATRIX.md scripts/import/check-import-readiness-state-alignment.mjs scripts/import/test-import-readiness-state-alignment.mjs
          git commit -m 'docs(p07): align exact rollback recovery state'
          git push origin HEAD:agent/rollback-exact-recovery-p07
