name: P05 fix RLS registration

on:
  push:
    branches:
      - agent/private-admin-wiring-p05
    paths:
      - .github/workflows/p05-fix-rls-registration.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/private-admin-wiring-p05
          fetch-depth: 1

      - name: Register migration 0082 in static RLS wrapper
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/db/test-rls-static-taxrlsa.mjs')
          text = path.read_text()
          old = "  pharmacyReservationAuditSplit: '0081_import_pharmacy_reservation_audit_split.sql',\n};"
          new = "  pharmacyReservationAuditSplit: '0081_import_pharmacy_reservation_audit_split.sql',\n  pharmacyPrivateExecutionAudit: '0082_import_pharmacy_private_execution_audit.sql',\n};"
          if text.count(old) != 1:
              raise SystemExit('Expected one migration registration anchor.')
          path.write_text(text.replace(old, new, 1))
          PY

          pnpm test:db:rls

      - name: Commit fix and remove temporary workflows
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/p05-fix-rls-registration.yml
          git rm -f .github/workflows/p05-rls-diagnostics.yml
          git add scripts/db/test-rls-static-taxrlsa.mjs
          git commit -m "fix(p05): register execution migration in RLS validation"
          git push origin HEAD:agent/private-admin-wiring-p05
