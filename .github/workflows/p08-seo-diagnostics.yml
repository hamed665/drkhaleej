name: P08 Static Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture validation
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/p08-static-diagnostics
          pnpm seo:check 2>&1 | tee artifacts/p08-static-diagnostics/validation.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p08-static-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/p08-static-diagnostics/
          if-no-files-found: error
          retention-days: 2
