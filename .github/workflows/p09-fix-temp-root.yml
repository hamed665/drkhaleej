name: P09 Temp Root Fix

on:
  push:
    branches:
      - agent/real-admin-canary-p09
    paths:
      - '.github/workflows/p09-fix-temp-root.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/real-admin-canary-p09
          fetch-depth: 0
      - name: Patch exact temp root
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          path = Path('scripts/import/run-p09-real-admin-canary.mjs')
          source = path.read_text()
          updated = source.replace('import os from "node:os";\n', '')
          updated = updated.replace(
              'mkdtemp(path.join(os.tmpdir(), "drkhaleej-p09-"))',
              'mkdtemp(path.join(root, ".drkhaleej-p09-"))',
          )
          if updated == source:
              raise SystemExit('expected P09 temp-root source was not found')
          path.write_text(updated)
          Path('.github/workflows/p09-fix-temp-root.yml').unlink()
          PY
          node --check scripts/import/run-p09-real-admin-canary.mjs
      - name: Commit correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/import/run-p09-real-admin-canary.mjs .github/workflows/p09-fix-temp-root.yml
          git commit -m "fix(p09): resolve publish harness dependencies"
          git push origin HEAD:agent/real-admin-canary-p09
