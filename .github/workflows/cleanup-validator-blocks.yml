name: Cleanup Validator Blocks

on:
  push:
    branches:
      - agent/pharmacy-authorization-invalidation-readback

permissions:
  contents: write

jobs:
  cleanup-validator-blocks:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pharmacy-authorization-invalidation-readback
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Remove duplicate lifecycle function and call
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/db/validate-migrations-current.mjs')
          s = p.read_text()
          block = """function validatePharmacyAuthorizationLifecycleMigration() {
            requireCondition(existsSync(pharmacyAuthorizationLifecycleMigrationPath), `${pharmacyAuthorizationLifecycleMigrationName} is missing.`);
            execFileSync(process.execPath, [pharmacyAuthorizationLifecycleValidator], { cwd: repoRoot, stdio: 'inherit' });
          }
          """.replace('          ', '')
          doubled_block = block + block
          if doubled_block not in s:
            raise SystemExit('duplicate lifecycle validator block not found')
          s = s.replace(doubled_block, block, 1)
          doubled_call = "validatePharmacyAuthorizationLifecycleMigration();\nvalidatePharmacyAuthorizationLifecycleMigration();"
          if doubled_call not in s:
            raise SystemExit('duplicate lifecycle validator call not found')
          s = s.replace(doubled_call, "validatePharmacyAuthorizationLifecycleMigration();", 1)
          p.write_text(s)
          PY
      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/db/validate-migrations-current.mjs
          git diff --cached --quiet && exit 0
          git commit -m "test: deduplicate lifecycle validator blocks"
          git push origin HEAD:agent/pharmacy-authorization-invalidation-readback
