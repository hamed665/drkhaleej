          git add scripts/import/run-p09-real-admin-canary.mjs scripts/import/check-import-p09-real-admin-canary.mjs .github/workflows/p09-real-admin-canary.yml package.json .github/workflows/p09-bootstrap.yml
          git commit -m "test(p09): add integrated Preview canary proof"
