          package['scripts']['import:p09-real-admin-canary:validate'] = 'node scripts/import/check-import-p09-real-admin-canary.mjs'
          package_path.write_text(json.dumps(package, indent=2) + '\n')
          PY
          rm .github/workflows/p09-bootstrap.yml
      - name: Commit generated proof
        shell: bash
        run: |
          set -euo pipefail
