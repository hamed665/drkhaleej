name: Debug Migrations

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  migration-diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@10.22.0 --activate
      - run: pnpm install --frozen-lockfile
      - name: Capture migration validation output
        shell: bash
        run: |
          set +e
          node scripts/db/validate-migrations-current.mjs > migrations.log 2>&1
          status=$?
          cat migrations.log
          echo "MIGRATIONS_EXIT=$status" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: migration-diagnostics
          path: migrations.log
          if-no-files-found: error
      - name: Preserve failure status
        run: exit "$MIGRATIONS_EXIT"
