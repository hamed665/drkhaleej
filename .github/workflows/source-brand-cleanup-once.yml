name: Source Brand Cleanup Once

on:
  push:
    branches:
      - source-brand-cleanup-auto-v1

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: source-brand-cleanup-auto-v1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace legacy public brand source copy
        run: |
          set -euo pipefail
          files=(
            'src/app/[locale]/[country]/for-providers/page-content.tsx'
            'src/components/public/discovery/publicDiscoveryPageConfig.ts'
          )

          for file in "${files[@]}"; do
            test -f "$file"
            perl -0pi -e 's/Dr\s+Muscat/DrKhaleej/g; s/Doctor\s+Muscat/DrKhaleej/g; s/DrMuscat/DrKhaleej/g; s/دکتر\s*مسقط/DrKhaleej/g; s/دكتور\s*مسقط/DrKhaleej/g; s/د\.\s*مسقط/DrKhaleej/g' "$file"
          done

      - name: Commit cleanup changes
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if git diff --quiet; then
            echo 'No source brand cleanup changes found.'
            exit 0
          fi

          git add src/app/[locale]/[country]/for-providers/page-content.tsx src/components/public/discovery/publicDiscoveryPageConfig.ts
          git commit -m 'Clean legacy public brand source copy'
          git push origin HEAD:source-brand-cleanup-auto-v1
