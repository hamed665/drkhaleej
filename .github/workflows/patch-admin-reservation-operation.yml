name: Patch Admin Reservation Operation
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.head_ref == 'agent/pharmacy-admin-reservation-operation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply scoped wiring
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/app/admin/imports/readiness/actions.ts'); s=p.read_text()
          s=s.replace('import { createPharmacyAdminReadStateStoreFromEnvironment } from "@/server/admin/import-pharmacy-admin-read-state-store";', 'import { createPharmacyAdminReadStateStoreFromEnvironment } from "@/server/admin/import-pharmacy-admin-read-state-store";\nimport {\n  createPharmacyAdminReservationDependenciesFromEnvironment,\n  runPharmacyAdminReservationOperation,\n  type PharmacyAdminReservationResult,\n} from "@/server/admin/import-pharmacy-admin-reservation-operation";')
          s=s.replace('const IMPORT_PHARMACY_PRIVATE_ADMIN_ENABLED_OPERATIONS = ["dry_run", "review"] as const;', 'const IMPORT_PHARMACY_PRIVATE_ADMIN_ENABLED_OPERATIONS = ["dry_run", "review", "reserve_private_publish"] as const;')
          s=s.replace('  authorizationState?: PharmacyPublishAuthorizationUiState | null;\n};', '  authorizationState?: PharmacyPublishAuthorizationUiState | null;\n  reservationState?: PharmacyAdminReservationResult | null;\n};')
          s=s.replace('  let authorizationUiState: PharmacyPublishAuthorizationUiState | null = null;', '  let authorizationUiState: PharmacyPublishAuthorizationUiState | null = null;\n  let reservationState: PharmacyAdminReservationResult | null = null;')
          old='''      if (operation !== "dry_run" && operation !== "review") {\n        return {\n          operation,\n          status: "failed",\n          entityId,\n          blockers: [],\n          publicVisibility: "private",\n          indexEligible: false,\n          sitemapEligible: false,\n          routeEnabled: false,\n          executionReference: null,\n        };\n      }'''
          new='''      if (operation !== "dry_run" && operation !== "review" && operation !== "reserve_private_publish") {\n        return { operation, status: "failed", entityId, blockers: [], publicVisibility: "private", indexEligible: false, sitemapEligible: false, routeEnabled: false, executionReference: null };\n      }'''
          s=s.replace(old,new)
          needle='''      const rollbackSnapshot = context.context.canaryInput.reservationRequest.rollbackSnapshot;'''
          insert='''      if (operation === "reserve_private_publish") {\n        const now = new Date().toISOString();\n        const reviewState = await store.readLatestFresh({ actorId, entityId, operation: "review", now });\n        const dependencies = createPharmacyAdminReservationDependenciesFromEnvironment();\n        reservationState = reviewState && dependencies\n          ? await runPharmacyAdminReservationOperation({\n              environment: process.env.VERCEL_ENV, actorId, entityId, allowedActorIds, allowedEntityIds,\n              confirmation: confirmation ?? "", now, reviewState, context: context.context, dependencies,\n            })\n          : null;\n        return {\n          operation, status: reservationState?.reserved ? "completed" : "failed", entityId, blockers: [],\n          publicVisibility: "private", indexEligible: false, sitemapEligible: false, routeEnabled: false,\n          executionReference: reservationState?.reserved ? reviewState?.operationAttemptId ?? null : null,\n        };\n      }\n\n'''+needle
          s=s.replace(needle,insert)
          s=s.replace('    authorizationState: authorizationUiState,\n  };', '    authorizationState: authorizationUiState,\n    reservationState,\n  };')
          p.write_text(s)

          p=Path('src/components/admin/import-pharmacy-private-admin-control-panel.tsx'); s=p.read_text()
          s=s.replace('''  {\n    operation: "private_publish",''','''  {\n    operation: "reserve_private_publish",\n    title: "Reserve private publish",\n    description: "Atomically reserve, snapshot, audit, and consume the exact server-side authorization without mutating the Pharmacy.",\n    readOnlyEnabled: true,\n  },\n  {\n    operation: "private_publish",''')
          s=s.replace('const actionEnabled = controlsEnabled && step.readOnlyEnabled;', 'const actionEnabled = controlsEnabled && step.readOnlyEnabled && (step.operation !== "reserve_private_publish" || result?.authorizationState?.authorizationReady === true);')
          s=s.replace('''                      {step.operation === "review" ? (''','''                      {step.operation === "review" || step.operation === "reserve_private_publish" ? (''')
          s=s.replace('name="publishConfirmation"', 'name={step.operation === "review" ? "publishConfirmation" : "confirmation"}')
          s=s.replace('placeholder={`PRIVATE PUBLISH ${entityId ?? "<entity-id>"}`}', 'placeholder={step.operation === "review" ? `PRIVATE PUBLISH ${entityId ?? "<entity-id>"}` : `RESERVE PRIVATE PUBLISH ${entityId ?? "<entity-id>"}`}')
          s=s.replace('No bulk · no public promotion · no manual bypass · no mutation execution', 'No bulk · no public promotion · no manual bypass · reservation does not mutate the entity')
          s=s.replace('  const blockers = result && !result.ok ? result.blockers : [];', '  const blockers = result && !result.ok ? result.blockers : [];\n  const reservationState = result?.reservationState ?? null;')
          s=s.replace('''      {publishCapability && !publishCapability.visible''','''      {reservationState ? (\n        <p className={`mt-4 rounded-xl border p-4 text-sm font-semibold ${reservationState.reserved ? "border-emerald-200 bg-emerald-50 text-emerald-900" : "border-rose-200 bg-rose-50 text-rose-900"}`}>\n          Reservation {reservationState.reserved ? (reservationState.replayed ? "replayed safely" : "created") : `blocked: ${reservationState.blocker ?? "unknown"}`} · Entity mutated: No · Route/index/sitemap: Disabled\n        </p>\n      ) : null}\n\n      {publishCapability && !publishCapability.visible''')
          p.write_text(s)

          p=Path('src/server/admin/import-pharmacy-private-admin-real-wiring.ts'); s=p.read_text()
          s=s.replace('''    review: dependencies.review,\n\n    async privatePublish''','''    review: dependencies.review,\n    async reservePrivatePublish() {\n      return { ok: false, reference: null };\n    },\n\n    async privatePublish''')
          p.write_text(s)
          PY
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/app/admin/imports/readiness/actions.ts src/components/admin/import-pharmacy-private-admin-control-panel.tsx src/server/admin/import-pharmacy-private-admin-real-wiring.ts
          git commit -m "feat: wire bounded Admin reservation operation"
          git push