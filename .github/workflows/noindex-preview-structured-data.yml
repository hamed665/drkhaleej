name: Noindex Preview Structured Data Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate noindex preview structured data
        run: node scripts/seo/check-noindex-preview-structured-data.mjs
