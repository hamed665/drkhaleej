name: P05 finalize static RLS coverage

on:
  pull_request:
    paths:
      - .github/workflows/p05-rls-diagnostics.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/private-admin-wiring-p05
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Register 0082 in the static RLS wrapper
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/db/test-rls-static-taxrlsa.mjs')
          source = path.read_text()

          migration_anchor = "  pharmacyReservationAuditSplit: '0081_import_pharmacy_reservation_audit_split.sql',\n};"
          migration_text = "  pharmacyReservationAuditSplit: '0081_import_pharmacy_reservation_audit_split.sql',\n  pharmacyPrivateExecutionAudit: '0082_import_pharmacy_private_execution_audit.sql',\n};"
          if "pharmacyPrivateExecutionAudit" not in source:
              if source.count(migration_anchor) != 1:
                  raise SystemExit('static RLS migration inventory anchor mismatch')
              source = source.replace(migration_anchor, migration_text, 1)

              validate_anchor = """  requirePattern(reservationAuditSplit, /grant\\s+execute\\s+on\\s+function\\s+public\\.import_publish_reserve_snapshot_audit[\\s\\S]*to\\s+service_role/i, '0081 must grant the reservation RPC only to service_role.');
}"""
              validate_text = """  requirePattern(reservationAuditSplit, /grant\\s+execute\\s+on\\s+function\\s+public\\.import_publish_reserve_snapshot_audit[\\s\\S]*to\\s+service_role/i, '0081 must grant the reservation RPC only to service_role.');

  const privateExecution = validateClosedMigration(
    'pharmacyPrivateExecutionAudit',
    '0082',
    [],
    { allowServiceRoleGrant: true, allowRowLocks: true },
  );
  requirePattern(privateExecution, /P05 PRIVATE-ADMIN-WIRING/i, '0082 must include its phase marker.');
  requirePattern(privateExecution, /security\\s+invoker/i, '0082 must keep the private publish RPC security invoker.');
  requirePattern(privateExecution, /set\\s+search_path\\s*=\\s*pg_catalog\\s*,\\s*public/i, '0082 must pin the private publish RPC search_path.');
  requirePattern(privateExecution, /revoke\\s+all\\s+on\\s+function\\s+public\\.import_publish_pharmacy_private[\\s\\S]*from\\s+public\\s*,\\s*anon\\s*,\\s*authenticated/i, '0082 must revoke private publish RPC access from public roles.');
  requirePattern(privateExecution, /grant\\s+execute\\s+on\\s+function\\s+public\\.import_publish_pharmacy_private[\\s\\S]*to\\s+service_role/i, '0082 must grant the private publish RPC only to service_role.');
  requirePattern(privateExecution, /status\\s*=\\s*'draft'::public\\.provider_status/i, '0082 must keep Pharmacy status draft.');
  requirePattern(privateExecution, /is_active\\s*=\\s*false/i, '0082 must keep Pharmacy inactive.');
  requirePattern(privateExecution, /is_featured\\s*=\\s*false/i, '0082 must keep Pharmacy unfeatured.');
}"""
              if source.count(validate_anchor) != 1:
                  raise SystemExit('static RLS 0081 validation anchor mismatch')
              source = source.replace(validate_anchor, validate_text, 1)
              path.write_text(source)
          PY

          pnpm test:db:rls

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/p05-rls-diagnostics.yml .github/workflows/p05-typecheck-diagnostics.yml .github/workflows/p05-patch-migration-validator.yml
          git add scripts/db/test-rls-static-taxrlsa.mjs
          git commit -m "test(p05): register execution migration in static RLS"
          git push origin HEAD:agent/private-admin-wiring-p05
