name: P04-A token normalization fix

on:
  push:
    branches:
      - agent/reservation-audit-split-p04a
    paths:
      - .github/workflows/p04a-fix-token-normalization.yml

permissions:
  contents: write

jobs:
  apply-exact-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/reservation-audit-split-p04a
          fetch-depth: 1

      - name: Apply exact case-normalization fix and regression contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          runner_path = Path('scripts/import/run-p03-reservation-db-safety.mjs')
          runner = runner_path.read_text()
          old = "assert(normalizedDefinition.includes(token), `Canonical reservation RPC is missing required transaction token: ${token}.`);"
          new = "assert(normalizedDefinition.includes(token.toLowerCase()), `Canonical reservation RPC is missing required transaction token: ${token}.`);"
          if runner.count(old) != 1:
              raise SystemExit('Expected exactly one unnormalized RPC token assertion.')
          runner_path.write_text(runner.replace(old, new, 1))

          checker_path = Path('scripts/import/check-import-reservation-db-safety-proof.mjs')
          checker = checker_path.read_text()
          anchor = "  \"const reservationAuditSchemaVersion = 'drkhaleej.import.publishAudit.v2'\",\n"
          addition = "  'normalizedDefinition.includes(token.toLowerCase())',\n"
          if addition not in checker:
              if checker.count(anchor) != 1:
                  raise SystemExit('Expected exactly one reservation audit schema contract anchor.')
              checker = checker.replace(anchor, anchor + addition, 1)
              checker_path.write_text(checker)
          PY

          node scripts/import/check-import-reservation-db-safety-proof.mjs

      - name: Commit exact fix and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/p04a-fix-token-normalization.yml
          git add scripts/import/run-p03-reservation-db-safety.mjs scripts/import/check-import-reservation-db-safety-proof.mjs
          git commit -m "fix: normalize hosted RPC contract tokens"
          git push origin HEAD:agent/reservation-audit-split-p04a
