name: DrKhaleej CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable corepack
        run: corepack enable
      - name: Prepare pnpm 10.22.0
        run: corepack prepare pnpm@10.22.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: SEO sequential diagnostic
        id: seo_diag
        continue-on-error: true
        shell: bash
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const { spawnSync } = require('node:child_process');
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          const commands = pkg.scripts['seo:check'].split(' && ');
          for (const [index, command] of commands.entries()) {
            const result = spawnSync(command, {
              shell: true,
              encoding: 'utf8',
              env: process.env,
            });
            if (result.status !== 0) {
              writeFileSync('seo-failure.txt', [
                `FAILED_INDEX=${index + 1}`,
                `FAILED_COMMAND=${command}`,
                `FAILED_STATUS=${result.status}`,
                '',
                'STDOUT:',
                result.stdout || '',
                '',
                'STDERR:',
                result.stderr || '',
              ].join('\n'));
              process.exit(result.status || 1);
            }
          }
          writeFileSync('seo-failure.txt', 'NO_FAILURE\n');
          NODE
      - name: Upload SEO diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-diagnostic
          path: seo-failure.txt
      - name: Fail when diagnostic failed
        if: steps.seo_diag.outcome == 'failure'
        run: exit 1
