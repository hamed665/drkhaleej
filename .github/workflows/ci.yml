name: DrKhaleej CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable corepack
        run: corepack enable
      - name: Prepare pnpm 10.22.0
        run: corepack prepare pnpm@10.22.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: SEO diagnostic
        id: seo
        shell: bash
        run: |
          set +e
          pnpm seo:check > seo-diagnostic.log 2>&1
          echo $? > seo-diagnostic.status
          exit 0
      - name: Upload SEO diagnostic artifact
        uses: actions/upload-artifact@v4
        with:
          name: seo-diagnostic
          path: |
            seo-diagnostic.log
            seo-diagnostic.status
      - name: Fail when SEO diagnostic failed
        shell: bash
        run: exit "$(cat seo-diagnostic.status)"
