name: DrKhaleej CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable corepack
        run: corepack enable
      - name: Prepare pnpm 10.22.0
        run: corepack prepare pnpm@10.22.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: SEO sequential diagnostic
        shell: bash
        run: |
          node <<'NODE' > seo-sequential.log 2>&1
          const { readFileSync } = require('node:fs');
          const { spawnSync } = require('node:child_process');
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          const commands = pkg.scripts['seo:check'].split(' && ');
          for (const [index, command] of commands.entries()) {
            console.log(`RUN ${index + 1}/${commands.length}: ${command}`);
            const result = spawnSync(command, {
              shell: true,
              encoding: 'utf8',
              env: process.env,
            });
            if (result.stdout) process.stdout.write(result.stdout);
            if (result.stderr) process.stderr.write(result.stderr);
            if (result.status !== 0) {
              console.error(`FAILED_COMMAND=${command}`);
              console.error(`FAILED_STATUS=${result.status}`);
              process.exit(result.status || 1);
            }
          }
          NODE
          status=$?
          tail -n 45 seo-sequential.log
          exit $status
